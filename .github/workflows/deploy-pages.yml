jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PORT: 3000
    steps:
      # --- ส่วนอื่น (checkout, ติดตั้ง node/pnpm) ปล่อยเหมือนเดิม ---

      # ✅ ใส่/แก้ตรงนี้ แทนคำสั่ง build เดิมทั้งหมด
      - name: สร้างแค่ mockup-sandbox เท่านั้น
        run: |
          cd artifacts/mockup-sandbox
          PORT=3000 pnpm build

      - name: อัปโหลดไฟล์ผลลัพธ์
        uses: actions/upload-pages-artifact@v3
        with:
          path: './artifacts/mockup-sandbox/dist'
